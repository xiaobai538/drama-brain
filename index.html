<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编剧第二大脑 · 稳定版</title>
  <style>
    body{
      margin:0;
      font-family:"PingFang SC","Microsoft YaHei",sans-serif;
      background:linear-gradient(180deg,#fff7fb,#f5f5ff);
      color:#5d4b75;
    }
    .topbar{
      position:sticky;
      top:0;
      background:rgba(255,255,255,0.95);
      border-bottom:1px solid #f0dff8;
      padding:14px 16px;
      z-index:99;
    }
    .brand{
      font-size:22px;
      font-weight:700;
      color:#7e66cb;
      margin-bottom:10px;
    }
    .tabs{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .tab-btn{
      border:none;
      border-radius:999px;
      padding:10px 16px;
      background:#fff;
      border:1px solid #ecdff8;
      color:#7d6aa0;
      cursor:pointer;
      font-weight:700;
    }
    .tab-btn.active{
      background:linear-gradient(135deg,#ff9fcd,#ab99ff);
      color:#fff;
      border-color:transparent;
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:20px 14px 40px;
    }

    .page{display:none;}
    .page.active{display:block;}

    .card{
      background:#fff;
      border:1px solid #f0e3fa;
      border-radius:20px;
      padding:16px;
      margin-bottom:16px;
      box-shadow:0 8px 24px rgba(183,156,224,0.12);
    }

    h2{
      margin:0 0 12px 0;
      font-size:20px;
      color:#7b62ca;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:10px 14px;
      cursor:pointer;
      font-weight:700;
      margin-right:8px;
      margin-bottom:8px;
    }
    .btn-primary{
      background:linear-gradient(135deg,#ff9cc8,#ab95ff);
      color:#fff;
    }
    .btn-soft{
      background:#fff;
      border:1px solid #eadcf6;
      color:#836fa3;
    }
    .btn-green{
      background:linear-gradient(135deg,#8be3c1,#7ecfff);
      color:#fff;
    }
    .btn-yellow{
      background:linear-gradient(135deg,#ffd57e,#ffb868);
      color:#fff;
    }
    .btn-red{
      background:linear-gradient(135deg,#ffa6ba,#ff7ebf);
      color:#fff;
    }

    .input,.select,.textarea{
      width:100%;
      padding:12px;
      border:1px solid #eadcf6;
      border-radius:14px;
      background:#fff;
      box-sizing:border-box;
      color:#5d4b75;
      margin-top:6px;
    }
    .textarea{
      min-height:100px;
      resize:vertical;
    }

    .label{
      font-size:13px;
      color:#8d7ca6;
      margin-top:10px;
      font-weight:700;
    }

    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }
    .grid-3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:16px;
    }
    @media (max-width:900px){
      .grid-2,.grid-3{grid-template-columns:1fr;}
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
      margin-bottom:16px;
    }
    @media (max-width:900px){
      .stats{grid-template-columns:repeat(2,1fr);}
    }
    .stat{
      background:#fff;
      border:1px solid #f0e2fa;
      border-radius:18px;
      padding:16px;
      text-align:center;
    }
    .stat-num{
      font-size:28px;
      font-weight:800;
      color:#7961ca;
    }
    .stat-label{
      font-size:13px;
      color:#907ea8;
      margin-top:6px;
    }

    .item{
      border:1px solid #f0e3fa;
      background:#fff;
      border-radius:16px;
      padding:12px;
      margin-bottom:10px;
    }
    .item-title{
      font-size:16px;
      font-weight:700;
      color:#6e58bf;
      margin-bottom:6px;
    }
    .meta{
      font-size:12px;
      color:#9382ab;
      margin-bottom:8px;
    }

    .pill{
      display:inline-block;
      padding:4px 10px;
      border-radius:999px;
      font-size:12px;
      background:#f8f2ff;
      color:#856dd0;
      margin-right:6px;
      margin-bottom:6px;
    }

    .status-待看{background:#eef5ff;color:#5c88d6;}
    .status-已看{background:#eefcf4;color:#4ca06e;}
    .status-待拆解{background:#fff8e8;color:#cf9729;}
    .status-已拆解{background:#f2efff;color:#7b65d1;}
    .status-跳过{background:#f4f4f4;color:#8e8e96;}

    table{
      width:100%;
      border-collapse:collapse;
      background:#fff;
    }
    th,td{
      border-bottom:1px solid #f3e8fb;
      padding:10px;
      text-align:left;
      vertical-align:top;
      font-size:13px;
    }
    th{
      background:#fff8fd;
      color:#856eae;
    }
    .table-wrap{
      overflow:auto;
      border:1px solid #f0e3fa;
      border-radius:16px;
    }

    .toast-wrap{
      position:fixed;
      top:20px;
      right:20px;
      z-index:999;
    }
    .toast{
      background:#fff;
      border:1px solid #efdff8;
      border-radius:14px;
      padding:12px 14px;
      margin-bottom:8px;
      box-shadow:0 8px 24px rgba(183,156,224,0.18);
      color:#745ea5;
      min-width:220px;
    }

    .hidden{display:none;}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">🎀 编剧第二大脑</div>
    <div class="tabs">
      <button class="tab-btn active" onclick="showPage('today', this)">今日待看</button>
      <button class="tab-btn" onclick="showPage('import', this)">刷榜单</button>
      <button class="tab-btn" onclick="showPage('library', this)">剧库</button>
      <button class="tab-btn" onclick="showPage('formula', this)">公式书</button>
      <button class="tab-btn" onclick="showPage('material', this)">素材库</button>
      <button class="tab-btn" onclick="showPage('settings', this)">设置</button>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>

  <div class="wrap">

    <!-- 今日待看 -->
    <div id="page-today" class="page active">
      <div class="stats" id="statsBox"></div>
      <div class="card">
        <h2>🌸 今日待看清单</h2>
        <div id="todayList"></div>
      </div>
    </div>

    <!-- 刷榜单 -->
    <div id="page-import" class="page">
      <div class="grid-2">
        <div class="card">
          <h2>📸 上传榜单截图</h2>
          <div class="label">榜单图片</div>
          <input type="file" id="imageInput" class="input" accept="image/*">
          <div class="label">来源榜单</div>
          <select id="sourceBoard" class="select">
            <option>日榜</option>
            <option>飙升榜</option>
            <option>新剧榜</option>
            <option>完结榜</option>
            <option>热搜榜</option>
          </select>
          <div style="margin-top:14px;">
            <button class="btn btn-primary" onclick="recognizeImage()">AI识别剧名</button>
            <button class="btn btn-soft" onclick="clearRecognize()">清空</button>
          </div>
          <div class="label">预览</div>
          <img id="previewImage" style="max-width:100%;border-radius:14px;display:none;border:1px solid #f0e3fa;">
        </div>

        <div class="card">
          <h2>🧁 识别结果</h2>
          <div style="margin-bottom:10px;">
            <button class="btn btn-soft" onclick="selectRecognized(true)">全选</button>
            <button class="btn btn-soft" onclick="selectRecognized(false)">取消全选</button>
            <button class="btn btn-green" onclick="importRecognized()">导入选中剧目</button>
          </div>
          <div id="recognizedList"></div>
        </div>
      </div>
    </div>

    <!-- 剧库 -->
    <div id="page-library" class="page">
      <div class="card">
        <h2>🎬 剧库总表</h2>
        <div class="grid-3">
          <div>
            <div class="label">搜索</div>
            <input id="searchDrama" class="input" placeholder="搜索剧名/备注" oninput="renderDramaTable()">
          </div>
          <div>
            <div class="label">状态筛选</div>
            <select id="filterDramaStatus" class="select" onchange="renderDramaTable()">
              <option value="">全部</option>
              <option>待看</option>
              <option>已看</option>
              <option>待拆解</option>
              <option>已拆解</option>
              <option>跳过</option>
            </select>
          </div>
          <div>
            <div class="label">题材筛选</div>
            <select id="filterDramaGenre" class="select" onchange="renderDramaTable()">
              <option value="">全部</option>
              <option>甜宠</option>
              <option>战神</option>
              <option>重生</option>
              <option>逆袭</option>
              <option>虐恋</option>
              <option>悬疑</option>
              <option>古装</option>
              <option>都市</option>
              <option>其他</option>
            </select>
          </div>
        </div>
        <div style="margin-top:14px;">
          <button class="btn btn-soft" onclick="exportCSV()">导出CSV</button>
          <button class="btn btn-soft" onclick="exportJSON()">导出JSON</button>
        </div>
        <div class="table-wrap" style="margin-top:14px;">
          <table>
            <thead>
              <tr>
                <th>剧名</th>
                <th>题材</th>
                <th>来源</th>
                <th>状态</th>
                <th>评分</th>
                <th>备注</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="dramaTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 公式书 -->
    <div id="page-formula" class="page">
      <div class="grid-2">
        <div class="card">
          <h2>📘 新建 / 编辑公式</h2>
          <input type="hidden" id="formulaId">

          <div class="label">公式名称</div>
          <input id="formulaTitle" class="input" placeholder="如：战神归来公式">

          <div class="label">题材类型</div>
          <select id="formulaGenre" class="select">
            <option>甜宠</option>
            <option>战神</option>
            <option>重生</option>
            <option>逆袭</option>
            <option>虐恋</option>
            <option>悬疑</option>
            <option>古装</option>
            <option>都市</option>
            <option>其他</option>
          </select>

          <div class="label">人设公式</div>
          <textarea id="formulaCharacter" class="textarea" placeholder="男主/女主/反派的人设结构"></textarea>

          <div class="label">框架公式</div>
          <textarea id="formulaFramework" class="textarea" placeholder="开篇钩子、推进结构、高潮模式"></textarea>

          <div class="label">高频事件</div>
          <textarea id="formulaEvent" class="textarea" placeholder="打脸、掉马、认亲、身份揭示……"></textarea>

          <div class="label">仿写思路</div>
          <textarea id="formulaRewrite" class="textarea" placeholder="如何复制这套公式写新剧"></textarea>

          <div class="label">避坑备注</div>
          <textarea id="formulaNote" class="textarea" placeholder="哪些地方容易俗、拖、弱"></textarea>

          <div class="label">参考剧目</div>
          <div id="formulaRefsBox" class="item">还没有参考剧目</div>

          <div style="margin-top:14px;">
            <button class="btn btn-primary" onclick="saveFormula()">保存公式</button>
            <button class="btn btn-soft" onclick="resetFormulaForm()">清空</button>
          </div>
        </div>

        <div class="card">
          <h2>🌷 公式书列表</h2>
          <div class="grid-2">
            <div>
              <div class="label">搜索</div>
              <input id="searchFormula" class="input" oninput="renderFormulaList()" placeholder="搜索公式名">
            </div>
            <div>
              <div class="label">题材筛选</div>
              <select id="filterFormulaGenre" class="select" onchange="renderFormulaList()">
                <option value="">全部</option>
                <option>甜宠</option>
                <option>战神</option>
                <option>重生</option>
                <option>逆袭</option>
                <option>虐恋</option>
                <option>悬疑</option>
                <option>古装</option>
                <option>都市</option>
                <option>其他</option>
              </select>
            </div>
          </div>
          <div id="formulaList" style="margin-top:14px;"></div>
        </div>
      </div>
    </div>

    <!-- 素材库 -->
    <div id="page-material" class="page">
      <div class="grid-2">
        <div class="card">
          <h2>💖 新增素材</h2>
          <input type="hidden" id="materialId">

          <div class="label">素材内容</div>
          <textarea id="materialContent" class="textarea" placeholder="灵感、人设、事件、对白、场景都可以"></textarea>

          <div class="label">素材类型</div>
          <select id="materialType" class="select">
            <option>灵感</option>
            <option>人设</option>
            <option>事件</option>
            <option>对白</option>
            <option>场景</option>
          </select>

          <div class="label">适用题材</div>
          <input id="materialGenre" class="input" placeholder="如：甜宠、重生">

          <div class="label">标签</div>
          <input id="materialTags" class="input" placeholder="如：打脸、掉马、误会">

          <div class="label">来源</div>
          <input id="materialSource" class="input" placeholder="哪部剧 / 自己想到的">

          <div style="margin-top:14px;">
            <button class="btn btn-primary" onclick="saveMaterial()">保存素材</button>
            <button class="btn btn-soft" onclick="resetMaterialForm()">清空</button>
          </div>
        </div>

        <div class="card">
          <h2>🧸 素材库列表</h2>
          <div class="grid-2">
            <div>
              <div class="label">搜索</div>
              <input id="searchMaterial" class="input" oninput="renderMaterialList()" placeholder="搜索内容/标签/来源">
            </div>
            <div>
              <div class="label">类型筛选</div>
              <select id="filterMaterialType" class="select" onchange="renderMaterialList()">
                <option value="">全部</option>
                <option>灵感</option>
                <option>人设</option>
                <option>事件</option>
                <option>对白</option>
                <option>场景</option>
              </select>
            </div>
          </div>
          <div id="materialList" style="margin-top:14px;"></div>
        </div>
      </div>
    </div>

    <!-- 设置 -->
    <div id="page-settings" class="page">
      <div class="grid-2">
        <div class="card">
          <h2>🔑 API 设置</h2>
          <div class="label">通义千问 API Key</div>
          <input id="apiKeyInput" class="input" placeholder="sk-xxxx">
          <div style="margin-top:14px;">
            <button class="btn btn-primary" onclick="saveApiKey()">保存 Key</button>
          </div>
        </div>

        <div class="card">
          <h2>📦 数据管理</h2>
          <div>
            <button class="btn btn-soft" onclick="triggerImportJSON()">导入JSON</button>
            <button class="btn btn-soft" onclick="exportJSON()">导出JSON</button>
            <button class="btn btn-red" onclick="clearAllData()">清空全部数据</button>
            <input type="file" id="jsonImportInput" class="hidden" accept=".json" onchange="handleImportJSON(event)">
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    var STORAGE_KEYS = {
      dramas: 'brain_dramas_v_stable',
      formulas: 'brain_formulas_v_stable',
      materials: 'brain_materials_v_stable',
      apiKey: 'brain_api_key_v_stable'
    };

    var currentRecognized = [];
    var currentFormulaRefs = [];

    function uid() {
      return 'id_' + new Date().getTime() + '_' + Math.floor(Math.random() * 100000);
    }

    function today() {
      var d = new Date();
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1);
      var day = String(d.getDate());
      if (m.length < 2) m = '0' + m;
      if (day.length < 2) day = '0' + day;
      return y + '-' + m + '-' + day;
    }

    function toast(msg) {
      var wrap = document.getElementById('toastWrap');
      var div = document.createElement('div');
      div.className = 'toast';
      div.innerHTML = msg;
      wrap.appendChild(div);
      setTimeout(function(){ if(div && div.parentNode) div.parentNode.removeChild(div); }, 2500);
    }

    function getData(key) {
      try {
        var raw = localStorage.getItem(key);
        if (!raw) return [];
        return JSON.parse(raw);
      } catch (e) {
        return [];
      }
    }

    function setData(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function getDramas() { return getData(STORAGE_KEYS.dramas); }
    function setDramas(v) { setData(STORAGE_KEYS.dramas, v); }

    function getFormulas() { return getData(STORAGE_KEYS.formulas); }
    function setFormulas(v) { setData(STORAGE_KEYS.formulas, v); }

    function getMaterials() { return getData(STORAGE_KEYS.materials); }
    function setMaterials(v) { setData(STORAGE_KEYS.materials, v); }

    function getApiKey() { return localStorage.getItem(STORAGE_KEYS.apiKey) || ''; }
    function setApiKeyValue(v) { localStorage.setItem(STORAGE_KEYS.apiKey, v); }

    function esc(str) {
      if (str === undefined || str === null) return '';
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    function normalizeDramaName(name) {
      if (!name) return '';
      name = String(name);
      name = name.replace(/^[\d\s\.\、\-—]+/, '');
      name = name.replace(/^第?\d+名[:：]?\s*/, '');
      name = name.replace(/^(TOP|Top)\s*\d+\s*/, '');
      name = name.replace(/\s+/g, ' ');
      return name.replace(/^\s+|\s+$/g, '');
    }

    function showPage(pageName, btn) {
      var pages = document.getElementsByClassName('page');
      var i;
      for (i = 0; i < pages.length; i++) {
        pages[i].className = 'page';
      }
      var page = document.getElementById('page-' + pageName);
      if (page) page.className = 'page active';

      var tabs = document.getElementsByClassName('tab-btn');
      for (i = 0; i < tabs.length; i++) {
        tabs[i].className = 'tab-btn';
      }
      if (btn) btn.className = 'tab-btn active';

      if (pageName === 'today') renderToday();
      if (pageName === 'library') renderDramaTable();
      if (pageName === 'formula') renderFormulaList();
      if (pageName === 'material') renderMaterialList();
      if (pageName === 'settings') loadSettings();
    }

    function renderStats() {
      var dramas = getDramas();
      var wait = 0, watched = 0, toAnalyze = 0, analyzed = 0;
      var i;
      for (i = 0; i < dramas.length; i++) {
        if (dramas[i].status === '待看') wait++;
        if (dramas[i].status === '已看') watched++;
        if (dramas[i].status === '待拆解') toAnalyze++;
        if (dramas[i].status === '已拆解') analyzed++;
      }
      document.getElementById('statsBox').innerHTML =
        '<div class="stat"><div class="stat-num">' + dramas.length + '</div><div class="stat-label">剧库总数</div></div>' +
        '<div class="stat"><div class="stat-num">' + wait + '</div><div class="stat-label">待看</div></div>' +
        '<div class="stat"><div class="stat-num">' + watched + '</div><div class="stat-label">已看</div></div>' +
        '<div class="stat"><div class="stat-num">' + toAnalyze + '</div><div class="stat-label">待拆解</div></div>';
    }

    function renderToday() {
      renderStats();
      var dramas = getDramas();
      var html = '';
      var i;
      var count = 0;
      for (i = 0; i < dramas.length; i++) {
        if (dramas[i].status === '待看') {
          count++;
          html += '<div class="item">';
          html += '<div class="item-title">' + count + '. ' + esc(dramas[i].name) + '</div>';
          html += '<div class="meta">' + esc(dramas[i].source || '') + ' · ' + esc(dramas[i].date || '') + '</div>';
          html += '<button class="btn btn-green" onclick="markWatched(\'' + dramas[i].id + '\')">看完</button>';
          html += '<button class="btn btn-yellow" onclick="markToAnalyze(\'' + dramas[i].id + '\')">待拆解</button>';
          html += '<button class="btn btn-soft" onclick="editDrama(\'' + dramas[i].id + '\')">编辑</button>';
          html += '<button class="btn btn-soft" onclick="skipDrama(\'' + dramas[i].id + '\')">跳过</button>';
          html += '</div>';
        }
      }
      if (!html) html = '<div class="item">今天没有待看的剧啦 ✨</div>';
      document.getElementById('todayList').innerHTML = html;
    }

    function saveApiKey() {
      var key = document.getElementById('apiKeyInput').value;
      if (!key) {
        toast('请输入 API Key');
        return;
      }
      setApiKeyValue(key);
      toast('API Key 已保存');
    }

    function loadSettings() {
      document.getElementById('apiKeyInput').value = getApiKey();
    }

    document.addEventListener('DOMContentLoaded', function(){
      var input = document.getElementById('imageInput');
      if (input) {
        input.addEventListener('change', function(e){
          var file = e.target.files[0];
          if (!file) return;
          var reader = new FileReader();
          reader.onload = function(ev){
            var img = document.getElementById('previewImage');
            img.src = ev.target.result;
            img.style.display = 'block';
            window._currentImageBase64 = ev.target.result;
          };
          reader.readAsDataURL(file);
        });
      }

      document.addEventListener('paste', function(e){
        var items = e.clipboardData && e.clipboardData.items;
        if (!items) return;
        var i;
        for (i = 0; i < items.length; i++) {
          if (items[i].type.indexOf('image/') === 0) {
            var file = items[i].getAsFile();
            var reader = new FileReader();
            reader.onload = function(ev){
              var img = document.getElementById('previewImage');
              img.src = ev.target.result;
              img.style.display = 'block';
              window._currentImageBase64 = ev.target.result;
              toast('已粘贴截图');
            };
            reader.readAsDataURL(file);
            break;
          }
        }
      });

      renderToday();
      renderDramaTable();
      renderFormulaList();
      renderMaterialList();
      loadSettings();
      renderFormulaRefsBox();
    });

    async function recognizeImage() {
      if (!window._currentImageBase64) {
        toast('请先上传图片');
        return;
      }
      var apiKey = getApiKey();
      if (!apiKey) {
        toast('请先去设置里保存 API Key');
        return;
      }

      toast('正在识别，请稍等...');
      try {
        var response = await fetch('https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + apiKey
          },
          body: JSON.stringify({
            model: 'qwen-vl-max',
            messages: [{
              role: 'user',
              content: [
                { type: 'image_url', image_url: { url: window._currentImageBase64 } },
                { type: 'text', text: '这是一张短剧榜单截图，请提取所有剧名，每行一个，只输出剧名，不要输出其他文字。' }
              ]
            }]
          })
        });

        var data = await response.json();
        if (!response.ok) {
          throw new Error((data && data.error && data.error.message) || '识别失败');
        }

        var content = data.choices[0].message.content;
        if (typeof content !== 'string') {
          content = JSON.stringify(content);
        }

        var arr = content.split('\n');
        var i, name;
        var map = {};
        var result = [];
        for (i = 0; i < arr.length; i++) {
          name = normalizeDramaName(arr[i]);
          if (name && name.length >= 2 && !map[name]) {
            map[name] = true;
            result.push(name);
          }
        }

        currentRecognized = result;
        renderRecognizedList();
        toast('识别完成，共 ' + result.length + ' 部');
      } catch (e) {
        toast('识别失败：' + e.message);
      }
    }

    function clearRecognize() {
      currentRecognized = [];
      window._currentImageBase64 = '';
      document.getElementById('recognizedList').innerHTML = '';
      document.getElementById('imageInput').value = '';
      var img = document.getElementById('previewImage');
      img.src = '';
      img.style.display = 'none';
    }

    function renderRecognizedList() {
      var dramas = getDramas();
      var existMap = {};
      var i;
      for (i = 0; i < dramas.length; i++) {
        existMap[dramas[i].name] = true;
      }

      var html = '';
      for (i = 0; i < currentRecognized.length; i++) {
        var name = currentRecognized[i];
        var dup = existMap[name];
        html += '<div class="item" style="' + (dup ? 'opacity:.5;' : '') + '">';
        html += '<input type="checkbox" class="recognizedCheck" data-index="' + i + '" ' + (dup ? '' : 'checked') + '> ';
        html += '<input type="text" class="input recognizedName" data-index="' + i + '" value="' + esc(name) + '" style="margin-top:8px;">';
        html += '<div class="meta">' + (dup ? '重复剧名' : '新剧') + '</div>';
        html += '</div>';
      }
      if (!html) html = '<div class="item">还没有识别结果</div>';
      document.getElementById('recognizedList').innerHTML = html;
    }

    function selectRecognized(checked) {
      var checks = document.getElementsByClassName('recognizedCheck');
      var i;
      for (i = 0; i < checks.length; i++) {
        checks[i].checked = checked;
      }
    }

    function importRecognized() {
      var dramas = getDramas();
      var existMap = {};
      var i;
      for (i = 0; i < dramas.length; i++) existMap[dramas[i].name] = true;

      var checks = document.getElementsByClassName('recognizedCheck');
      var names = document.getElementsByClassName('recognizedName');
      var source = document.getElementById('sourceBoard').value;
      var addCount = 0;

      for (i = 0; i < checks.length; i++) {
        if (!checks[i].checked) continue;
        var name = normalizeDramaName(names[i].value);
        if (!name || existMap[name]) continue;
        dramas.unshift({
          id: uid(),
          name: name,
          genre: '',
          source: source,
          status: '待看',
          rating: '',
          note: '',
          analyze: '否',
          link: '',
          date: today()
        });
        existMap[name] = true;
        addCount++;
      }

      setDramas(dramas);
      renderToday();
      renderDramaTable();
      renderRecognizedList();
      toast('已导入 ' + addCount + ' 部剧');
    }

    function renderDramaTable() {
      var dramas = getDramas();
      var search = document.getElementById('searchDrama').value.toLowerCase();
      var status = document.getElementById('filterDramaStatus').value;
      var genre = document.getElementById('filterDramaGenre').value;

      var html = '';
      var i;
      for (i = 0; i < dramas.length; i++) {
        var d = dramas[i];
        var text = (d.name + ' ' + (d.note || '')).toLowerCase();
        if (search && text.indexOf(search) === -1) continue;
        if (status && d.status !== status) continue;
        if (genre && d.genre !== genre) continue;

        html += '<tr>';
        html += '<td>' + esc(d.name) + '</td>';
        html += '<td>' + esc(d.genre || '-') + '</td>';
        html += '<td>' + esc(d.source || '-') + '</td>';
        html += '<td><span class="pill status-' + esc(d.status) + '">' + esc(d.status) + '</span></td>';
        html += '<td>' + esc(d.rating || '-') + '</td>';
        html += '<td>' + esc(d.note || '-') + '</td>';
        html += '<td>';
        html += '<button class="btn btn-soft" onclick="editDrama(\'' + d.id + '\')">编辑</button>';
        html += '<button class="btn btn-yellow" onclick="openFormulaAttach(\'' + d.id + '\')">加到公式书</button>';
        html += '<button class="btn btn-red" onclick="deleteDrama(\'' + d.id + '\')">删除</button>';
        html += '</td>';
        html += '</tr>';
      }

      if (!html) {
        html = '<tr><td colspan="7">暂无数据</td></tr>';
      }
      document.getElementById('dramaTableBody').innerHTML = html;
    }

    function editDrama(id) {
      var dramas = getDramas();
      var i, d = null;
      for (i = 0; i < dramas.length; i++) {
        if (dramas[i].id === id) { d = dramas[i]; break; }
      }
      if (!d) return;

      var name = prompt('剧名：', d.name);
      if (name === null) return;

      var genre = prompt('题材（甜宠/战神/重生/逆袭/虐恋/悬疑/古装/都市/其他）：', d.genre || '');
      if (genre === null) genre = d.genre || '';

      var status = prompt('状态（待看/已看/待拆解/已拆解/跳过）：', d.status || '待看');
      if (status === null) status = d.status || '待看';

      var rating = prompt('评分（⭐到⭐⭐⭐⭐⭐）：', d.rating || '');
      if (rating === null) rating = d.rating || '';

      var note = prompt('备注：', d.note || '');
      if (note === null) note = d.note || '';

      d.name = name;
      d.genre = genre;
      d.status = status;
      d.rating = rating;
      d.note = note;

      setDramas(dramas);
      renderToday();
      renderDramaTable();
      toast('剧目已更新');
    }

    function deleteDrama(id) {
      if (!confirm('确定删除这条剧目吗？')) return;
      var dramas = getDramas();
      var result = [];
      var i;
      for (i = 0; i < dramas.length; i++) {
        if (dramas[i].id !== id) result.push(dramas[i]);
      }
      setDramas(result);
      renderToday();
      renderDramaTable();
      toast('已删除');
    }

    function markWatched(id) {
      var dramas = getDramas();
      var i;
      for (i = 0; i < dramas.length; i++) {
        if (dramas[i].id === id) dramas[i].status = '已看';
      }
      setDramas(dramas);
      renderToday();
      renderDramaTable();
      toast('已标记为已看');
    }

    function markToAnalyze(id) {
      var dramas = getDramas();
      var i;
      for (i = 0; i < dramas.length; i++) {
        if (dramas[i].id === id) {
          dramas[i].status = '待拆解';
          dramas[i].analyze = '是';
        }
      }
      setDramas(dramas);
      renderToday();
      renderDramaTable();
      toast('已标记为待拆解');
    }

    function skipDrama(id) {
      var dramas = getDramas();
      var i;
      for (i = 0; i < dramas.length; i++) {
        if (dramas[i].id === id) dramas[i].status = '跳过';
      }
      setDramas(dramas);
      renderToday();
      renderDramaTable();
      toast('已跳过');
    }

    function renderFormulaRefsBox() {
      var box = document.getElementById('formulaRefsBox');
      if (!currentFormulaRefs.length) {
        box.innerHTML = '还没有参考剧目';
        return;
      }
      var html = '';
      var i;
      for (i = 0; i < currentFormulaRefs.length; i++) {
        html += '<span class="pill">' + esc(currentFormulaRefs[i]) + ' <a href="javascript:void(0)" onclick="removeFormulaRef(' + i + ')">×</a></span>';
      }
      box.innerHTML = html;
    }

    function removeFormulaRef(index) {
      currentFormulaRefs.splice(index, 1);
      renderFormulaRefsBox();
    }

    function resetFormulaForm() {
      document.getElementById('formulaId').value = '';
      document.getElementById('formulaTitle').value = '';
      document.getElementById('formulaGenre').value = '甜宠';
      document.getElementById('formulaCharacter').value = '';
      document.getElementById('formulaFramework').value = '';
      document.getElementById('formulaEvent').value = '';
      document.getElementById('formulaRewrite').value = '';
      document.getElementById('formulaNote').value = '';
      currentFormulaRefs = [];
      renderFormulaRefsBox();
    }

    function saveFormula() {
      var title = document.getElementById('formulaTitle').value;
      if (!title) {
        toast('请填写公式名称');
        return;
      }

      var item = {
        id: document.getElementById('formulaId').value || uid(),
        title: title,
        genre: document.getElementById('formulaGenre').value,
        character: document.getElementById('formulaCharacter').value,
        framework: document.getElementById('formulaFramework').value,
        event: document.getElementById('formulaEvent').value,
        rewrite: document.getElementById('formulaRewrite').value,
        note: document.getElementById('formulaNote').value,
        refs: currentFormulaRefs.slice(0),
        updatedAt: today()
      };

      var list = getFormulas();
      var i, found = false;
      for (i = 0; i < list.length; i++) {
        if (list[i].id === item.id) {
          list[i] = item;
          found = true;
        }
      }
      if (!found) list.unshift(item);

      setFormulas(list);
      renderFormulaList();
      resetFormulaForm();
      toast('公式已保存');
    }

    function renderFormulaList() {
      var list = getFormulas();
      var search = document.getElementById('searchFormula').value.toLowerCase();
      var genre = document.getElementById('filterFormulaGenre').value;
      var html = '';
      var i;
      for (i = 0; i < list.length; i++) {
        var f = list[i];
        var text = (f.title + ' ' + (f.note || '') + ' ' + (f.refs || []).join(' ')).toLowerCase();
        if (search && text.indexOf(search) === -1) continue;
        if (genre && f.genre !== genre) continue;

        html += '<div class="item">';
        html += '<div class="item-title">' + esc(f.title) + '</div>';
        html += '<div class="meta"><span class="pill">' + esc(f.genre) + '</span><span class="pill">更新：' + esc(f.updatedAt || '') + '</span></div>';
        html += '<div><b>参考剧：</b> ' + esc((f.refs || []).join('、') || '无') + '</div>';
        html += '<div style="margin-top:8px;">';
        html += '<button class="btn btn-soft" onclick="editFormula(\'' + f.id + '\')">编辑</button>';
        html += '<button class="btn btn-red" onclick="deleteFormula(\'' + f.id + '\')">删除</button>';
        html += '</div>';
        html += '</div>';
      }
      if (!html) html = '<div class="item">还没有公式书记录</div>';
      document.getElementById('formulaList').innerHTML = html;
    }

    function editFormula(id) {
      var list = getFormulas();
      var i, f = null;
      for (i = 0; i < list.length; i++) {
        if (list[i].id === id) { f = list[i]; break; }
      }
      if (!f) return;

      document.getElementById('formulaId').value = f.id;
      document.getElementById('formulaTitle').value = f.title || '';
      document.getElementById('formulaGenre').value = f.genre || '甜宠';
      document.getElementById('formulaCharacter').value = f.character || '';
      document.getElementById('formulaFramework').value = f.framework || '';
      document.getElementById('formulaEvent').value = f.event || '';
      document.getElementById('formulaRewrite').value = f.rewrite || '';
      document.getElementById('formulaNote').value = f.note || '';
      currentFormulaRefs = (f.refs || []).slice(0);
      renderFormulaRefsBox();
      toast('已载入公式，可编辑');
    }

    function deleteFormula(id) {
      if (!confirm('确定删除这条公式吗？')) return;
      var list = getFormulas();
      var result = [];
      var i;
      for (i = 0; i < list.length; i++) {
        if (list[i].id !== id) result.push(list[i]);
      }
      setFormulas(result);
      renderFormulaList();
      toast('公式已删除');
    }

    function openFormulaAttach(dramaId) {
      var dramas = getDramas();
      var formulas = getFormulas();
      var d = null;
      var i;
      for (i = 0; i < dramas.length; i++) {
        if (dramas[i].id === dramaId) d = dramas[i];
      }
      if (!d) return;

      if (!formulas.length) {
        alert('还没有公式书，请先新建公式。');
        showPage('formula', document.getElementsByClassName('tab-btn')[3]);
        currentFormulaRefs = [d.name];
        renderFormulaRefsBox();
        return;
      }

      var names = [];
      for (i = 0; i < formulas.length; i++) {
        names.push((i + 1) + '.' + formulas[i].title);
      }

      var choice = prompt('把《' + d.name + '》加入哪一本公式书？\n\n' + names.join('\n') + '\n\n输入数字：');
      if (choice === null) return;
      var index = parseInt(choice, 10) - 1;
      if (index < 0 || index >= formulas.length) {
        alert('输入无效');
        return;
      }

      if (!formulas[index].refs) formulas[index].refs = [];
      if (formulas[index].refs.indexOf(d.name) === -1) {
        formulas[index].refs.push(d.name);
        formulas[index].updatedAt = today();
      }

      setFormulas(formulas);
      renderFormulaList();
      toast('已加入公式书');
    }

    function resetMaterialForm() {
      document.getElementById('materialId').value = '';
      document.getElementById('materialContent').value = '';
      document.getElementById('materialType').value = '灵感';
      document.getElementById('materialGenre').value = '';
      document.getElementById('materialTags').value = '';
      document.getElementById('materialSource').value = '';
    }

    function saveMaterial() {
      var content = document.getElementById('materialContent').value;
      if (!content) {
        toast('请填写素材内容');
        return;
      }

      var item = {
        id: document.getElementById('materialId').value || uid(),
        content: content,
        type: document.getElementById('materialType').value,
        genre: document.getElementById('materialGenre').value,
        tags: document.getElementById('materialTags').value,
        source: document.getElementById('materialSource').value,
        used: false,
        createdAt: today()
      };

      var list = getMaterials();
      var i, found = false;
      for (i = 0; i < list.length; i++) {
        if (list[i].id === item.id) {
          list[i] = item;
          found = true;
        }
      }
      if (!found) list.unshift(item);

      setMaterials(list);
      resetMaterialForm();
      renderMaterialList();
      toast('素材已保存');
    }

    function renderMaterialList() {
      var list = getMaterials();
      var search = document.getElementById('searchMaterial').value.toLowerCase();
      var type = document.getElementById('filterMaterialType').value;
      var html = '';
      var i;
      for (i = 0; i < list.length; i++) {
        var m = list[i];
        var text = (m.content + ' ' + (m.tags || '') + ' ' + (m.source || '')).toLowerCase();
        if (search && text.indexOf(search) === -1) continue;
        if (type && m.type !== type) continue;

        html += '<div class="item" style="' + (m.used ? 'opacity:.55;' : '') + '">';
        html += '<div class="item-title">' + esc(m.content) + '</div>';
        html += '<div class="meta">';
        html += '<span class="pill">' + esc(m.type) + '</span>';
        if (m.genre) html += '<span class="pill">' + esc(m.genre) + '</span>';
        if (m.tags) html += '<span class="pill">' + esc(m.tags) + '</span>';
        if (m.source) html += '<span class="pill">来源：' + esc(m.source) + '</span>';
        html += '</div>';
        html += '<button class="btn btn-soft" onclick="toggleMaterialUsed(\'' + m.id + '\')">' + (m.used ? '改为未用' : '标记已用') + '</button>';
        html += '<button class="btn btn-soft" onclick="editMaterial(\'' + m.id + '\')">编辑</button>';
        html += '<button class="btn btn-red" onclick="deleteMaterial(\'' + m.id + '\')">删除</button>';
        html += '</div>';
      }
      if (!html) html = '<div class="item">还没有素材记录</div>';
      document.getElementById('materialList').innerHTML = html;
    }

    function editMaterial(id) {
      var list = getMaterials();
      var i, m = null;
      for (i = 0; i < list.length; i++) {
        if (list[i].id === id) m = list[i];
      }
      if (!m) return;

      document.getElementById('materialId').value = m.id;
      document.getElementById('materialContent').value = m.content || '';
      document.getElementById('materialType').value = m.type || '灵感';
      document.getElementById('materialGenre').value = m.genre || '';
      document.getElementById('materialTags').value = m.tags || '';
      document.getElementById('materialSource').value = m.source || '';
      toast('已载入素材，可编辑');
    }

    function toggleMaterialUsed(id) {
      var list = getMaterials();
      var i;
      for (i = 0; i < list.length; i++) {
        if (list[i].id === id) list[i].used = !list[i].used;
      }
      setMaterials(list);
      renderMaterialList();
    }

    function deleteMaterial(id) {
      if (!confirm('确定删除这条素材吗？')) return;
      var list = getMaterials();
      var result = [];
      var i;
      for (i = 0; i < list.length; i++) {
        if (list[i].id !== id) result.push(list[i]);
      }
      setMaterials(result);
      renderMaterialList();
      toast('素材已删除');
    }

    function exportCSV() {
      var dramas = getDramas();
      var rows = [['剧名','题材','来源','状态','评分','备注','日期']];
      var i;
      for (i = 0; i < dramas.length; i++) {
        rows.push([
          dramas[i].name || '',
          dramas[i].genre || '',
          dramas[i].source || '',
          dramas[i].status || '',
          dramas[i].rating || '',
          dramas[i].note || '',
          dramas[i].date || ''
        ]);
      }
      var csv = '';
      for (i = 0; i < rows.length; i++) {
        var line = [];
        var j;
        for (j = 0; j < rows[i].length; j++) {
          line.push('"' + String(rows[i][j]).replace(/"/g, '""') + '"');
        }
        csv += line.join(',') + '\n';
      }
      var blob = new Blob(['\ufeff' + csv], {type:'text/csv;charset=utf-8;'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = '剧库_' + today() + '.csv';
      a.click();
    }

    function exportJSON() {
      var data = {
        dramas: getDramas(),
        formulas: getFormulas(),
        materials: getMaterials(),
        exportAt: new Date().toISOString()
      };
      var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = '编剧第二大脑_' + today() + '.json';
      a.click();
    }

    function triggerImportJSON() {
      document.getElementById('jsonImportInput').click();
    }

    function handleImportJSON(event) {
      var file = event.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(ev) {
        try {
          var data = JSON.parse(ev.target.result);
          如果 (数据.剧集) 设置剧集(数据.剧集);
          如果 (data.公式) 设置公式(data.公式);
          如果 (data.材料) 设置材料(data.材料);
          renderToday();
          renderDramaTable();
          renderFormulaList();
          renderMaterialList();
          提示('导入成功');
        } 捕获 (e) {
          toast('导入失败');
        }
      };
      reader.readAsText(file, 'utf-8');
    }

    function clearAllData() {
      if (!confirm('确定清空全部数据吗？')) return;
      localStorage.removeItem(STORAGE_KEYS.dramas);
      localStorage.removeItem(STORAGE_KEYS.formulas);
      localStorage.removeItem(STORAGE_KEYS.materials);
      renderToday();
      renderDramaTable();
      renderFormulaList();
      renderMaterialList();
      提示('已清空全部数据');
    }
  </script>
